<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimation Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0f1117;
  --bg-secondary: #161922;
  --bg-tertiary: #1c1f2e;
  --bg-elevated: #222639;
  --border: #2a2e3f;
  --border-subtle: #1e2233;
  --text-primary: #e2e4ed;
  --text-secondary: #8b8fa3;
  --text-muted: #5c6078;
  --accent-amber: #d4a053;
  --accent-amber-dim: #a37b3e;
  --accent-amber-bg: rgba(212, 160, 83, 0.08);
  --accent-green: #4aba7a;
  --accent-green-bg: rgba(74, 186, 122, 0.1);
  --accent-yellow: #d4b84a;
  --accent-yellow-bg: rgba(212, 184, 74, 0.1);
  --accent-orange: #d48a3e;
  --accent-orange-bg: rgba(212, 138, 62, 0.1);
  --accent-red: #c75454;
  --accent-red-bg: rgba(199, 84, 84, 0.1);
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --transition: 150ms ease;
}

html { font-size: 14px; }
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: sticky;
  top: 0;
  transition: transform var(--transition), width var(--transition);
  z-index: 100;
}

.sidebar-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--accent-amber);
  letter-spacing: 0.03em;
  margin-bottom: 2px;
}

.sidebar-header p {
  font-size: 0.75rem;
  color: var(--text-muted);
}

.sidebar-actions {
  padding: 10px 12px;
  display: flex;
  gap: 6px;
  border-bottom: 1px solid var(--border);
}

.sidebar-actions button {
  flex: 1;
  padding: 6px 10px;
  font-size: 0.75rem;
  font-family: var(--font-body);
  font-weight: 500;
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
}

.sidebar-actions button:hover {
  background: var(--bg-elevated);
  color: var(--text-primary);
}

.sidebar-actions button.danger:hover {
  border-color: var(--accent-red);
  color: var(--accent-red);
}

.history-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.history-item {
  padding: 10px 12px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background var(--transition);
  margin-bottom: 2px;
  position: relative;
}

.history-item:hover { background: var(--bg-tertiary); }
.history-item.active { background: var(--bg-elevated); border: 1px solid var(--border); }

.history-item-name {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding-right: 20px;
}

.history-item-meta {
  font-size: 0.7rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  margin-top: 2px;
  display: flex;
  gap: 8px;
  align-items: center;
}

.history-item-delete {
  position: absolute;
  top: 10px;
  right: 8px;
  width: 18px;
  height: 18px;
  border: none;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.7rem;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity var(--transition);
}

.history-item:hover .history-item-delete { opacity: 1; }
.history-item-delete:hover { color: var(--accent-red); background: var(--accent-red-bg); }

.history-empty {
  padding: 24px 16px;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.75rem;
}

.main {
  flex: 1;
  min-width: 0;
  height: 100vh;
  overflow-y: auto;
}

.main-inner {
  max-width: 820px;
  margin: 0 auto;
  padding: 32px 40px 80px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
}

.top-bar-left { display: flex; align-items: center; gap: 12px; }

.mode-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 5px 12px;
  cursor: pointer;
  user-select: none;
  transition: all var(--transition);
}

.mode-toggle:hover { border-color: var(--accent-amber-dim); }

.mode-toggle-label {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-secondary);
}

.mode-toggle-switch {
  width: 32px;
  height: 18px;
  background: var(--bg-tertiary);
  border-radius: 9px;
  position: relative;
  transition: background var(--transition);
}

.mode-toggle-switch::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 12px;
  height: 12px;
  background: var(--text-muted);
  border-radius: 50%;
  transition: all var(--transition);
}

.mode-toggle.active .mode-toggle-switch { background: var(--accent-amber-bg); }
.mode-toggle.active .mode-toggle-switch::after {
  left: 17px;
  background: var(--accent-amber);
}

.btn-new {
  padding: 6px 14px;
  font-size: 0.75rem;
  font-family: var(--font-body);
  font-weight: 600;
  background: var(--accent-amber);
  color: var(--bg-primary);
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
}

.btn-new:hover { filter: brightness(1.1); }

.mobile-menu-btn {
  display: none;
  padding: 6px 10px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 1rem;
}

.section { margin-bottom: 28px; }

.section-title {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.section-title .weight-badge {
  font-size: 0.6rem;
  background: var(--accent-amber-bg);
  color: var(--accent-amber);
  padding: 1px 6px;
  border-radius: 3px;
  text-transform: none;
  letter-spacing: 0;
}

.field { margin-bottom: 14px; }

.field label {
  display: block;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 5px;
}

.field input[type="text"],
.field textarea,
.field select {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.85rem;
  transition: border-color var(--transition);
  outline: none;
}

.field input:focus,
.field textarea:focus,
.field select:focus {
  border-color: var(--accent-amber-dim);
}

.field textarea { resize: vertical; min-height: 64px; }

.field select {
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%235c6078' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  padding-right: 32px;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.dimension {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  margin-bottom: 8px;
  transition: border-color var(--transition);
}

.dimension:hover { border-color: var(--border); }
.dimension.has-value { border-color: var(--border); }

.dimension-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}

.dimension-info { flex: 1; }

.dimension-name {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 6px;
}

.dimension-desc {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.dimension-value {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--accent-amber);
  min-width: 24px;
  text-align: right;
}

.points-row {
  display: flex;
  gap: 6px;
}

.point-badge {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 600;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  color: var(--text-muted);
  cursor: pointer;
  transition: all var(--transition);
  user-select: none;
  min-width: 34px;
  text-align: center;
}

.point-badge:hover {
  border-color: var(--accent-amber-dim);
  color: var(--text-secondary);
  background: var(--bg-elevated);
}

.point-badge:focus-visible {
  outline: 2px solid var(--accent-amber);
  outline-offset: 1px;
}

.point-badge.selected {
  background: var(--accent-amber-bg);
  border-color: var(--accent-amber);
  color: var(--accent-amber);
}

.point-badge.mid.selected { background: var(--accent-yellow-bg); border-color: var(--accent-yellow); color: var(--accent-yellow); }
.point-badge.high.selected { background: var(--accent-orange-bg); border-color: var(--accent-orange); color: var(--accent-orange); }
.point-badge.vhigh.selected { background: var(--accent-red-bg); border-color: var(--accent-red); color: var(--accent-red); }

.dimension-tooltip {
  position: relative;
}

.dimension-tooltip .tip-icon {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  color: var(--text-muted);
  cursor: help;
  flex-shrink: 0;
}

.dimension-tooltip .tip-content {
  display: none;
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  width: 280px;
  z-index: 50;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.dimension-tooltip:hover .tip-content,
.dimension-tooltip:focus-within .tip-content {
  display: block;
}

.tip-content .tip-row {
  display: flex;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 0.7rem;
}

.tip-content .tip-row:last-child { margin-bottom: 0; }

.tip-content .tip-label {
  font-family: var(--font-mono);
  font-weight: 600;
  color: var(--text-secondary);
  white-space: nowrap;
  min-width: 40px;
}

.tip-content .tip-text { color: var(--text-muted); }

.totals-bar {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 12px;
}

.total-item { text-align: center; }

.total-label {
  font-size: 0.65rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 2px;
}

.total-value {
  font-family: var(--font-mono);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent-amber);
}

.risk-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  font-size: 0.7rem;
  font-weight: 600;
}

.risk-badge.low { background: var(--accent-green-bg); color: var(--accent-green); }
.risk-badge.medium { background: var(--accent-yellow-bg); color: var(--accent-yellow); }
.risk-badge.high { background: var(--accent-orange-bg); color: var(--accent-orange); }
.risk-badge.critical { background: var(--accent-red-bg); color: var(--accent-red); }

.approach-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 10px;
  position: relative;
}

.approach-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.approach-number {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.approach-remove {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.75rem;
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  transition: all var(--transition);
}

.approach-remove:hover { color: var(--accent-red); background: var(--accent-red-bg); }

.approach-adjustments { margin-top: 12px; }

.approach-adjustments-title {
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.adjustment-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 0.75rem;
}

.adjustment-dim-name {
  width: 100px;
  color: var(--text-secondary);
  font-weight: 500;
  font-size: 0.7rem;
}

.adjustment-original {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  width: 20px;
  text-align: center;
}

.adjustment-arrow {
  color: var(--text-muted);
  font-size: 0.65rem;
}

.adj-points-row {
  display: flex;
  gap: 3px;
}

.adj-point-badge {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 7px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg-tertiary);
  color: var(--text-muted);
  cursor: pointer;
  transition: all var(--transition);
  min-width: 26px;
  text-align: center;
}

.adj-point-badge:hover { border-color: var(--accent-amber-dim); color: var(--text-secondary); }
.adj-point-badge.selected { background: var(--accent-green-bg); border-color: var(--accent-green); color: var(--accent-green); }
.adj-point-badge.same { background: var(--accent-amber-bg); border-color: var(--accent-amber-dim); color: var(--accent-amber-dim); }

.approach-total {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.approach-total-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-weight: 500;
}

.approach-total-value {
  font-family: var(--font-mono);
  font-size: 1rem;
  font-weight: 700;
  color: var(--accent-amber);
}

.approach-total-delta {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 500;
  margin-left: 6px;
}

.approach-total-delta.reduced { color: var(--accent-green); }
.approach-total-delta.same { color: var(--text-muted); }

.btn-add-approach {
  width: 100%;
  padding: 10px;
  background: var(--bg-tertiary);
  border: 1px dashed var(--border);
  border-radius: var(--radius-md);
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}

.btn-add-approach:hover {
  border-color: var(--accent-amber-dim);
  color: var(--text-secondary);
}

.btn-add-approach:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.summary-panel {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.summary-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.summary-header-title {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.btn-copy {
  padding: 4px 12px;
  font-size: 0.7rem;
  font-family: var(--font-mono);
  font-weight: 500;
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
}

.btn-copy:hover { border-color: var(--accent-amber-dim); color: var(--text-primary); }
.btn-copy.copied { border-color: var(--accent-green); color: var(--accent-green); }

.summary-body {
  padding: 16px;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  line-height: 1.7;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-word;
}

@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .mobile-menu-btn { display: block; }
  .main-inner { padding: 20px 16px 60px; }
  .field-row { grid-template-columns: 1fr; }
  .totals-bar { flex-direction: column; align-items: stretch; }
  .total-item { text-align: left; display: flex; justify-content: space-between; }
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 99;
}

.sidebar-overlay.active { display: block; }

@media print {
  body { background: #fff; color: #111; }
  .sidebar, .top-bar, .section:not(.section-summary), .btn-copy, .mobile-menu-btn { display: none !important; }
  .main { height: auto; overflow: visible; }
  .main-inner { max-width: 100%; padding: 0; }
  .summary-panel { border: 1px solid #ccc; }
  .summary-body { color: #222; }
  .summary-header { background: #f5f5f5; }
}

.fade-in {
  animation: fadeIn 200ms ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.quick-hidden { display: none !important; }
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>est.</h1>
    <p>Feature estimation tool</p>
  </div>
  <div class="sidebar-actions">
    <button onclick="newEstimation()">+ New</button>
    <button class="danger" onclick="clearHistory()">Clear all</button>
  </div>
  <div class="history-list" id="historyList">
    <div class="history-empty">No saved estimations</div>
  </div>
</aside>

<main class="main">
  <div class="main-inner">
    <div class="top-bar">
      <div class="top-bar-left">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">&#9776;</button>
        <div class="mode-toggle" id="modeToggle" tabindex="0" role="switch" aria-checked="false" onclick="toggleMode()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleMode()}">
          <span class="mode-toggle-label">Quick mode</span>
          <div class="mode-toggle-switch"></div>
        </div>
      </div>
      <button class="btn-new" onclick="newEstimation()">New estimation</button>
    </div>

    <div class="section" id="sectionEntry">
      <div class="section-title">Feature details</div>
      <div class="field">
        <label for="featureName">Name</label>
        <input type="text" id="featureName" placeholder="e.g. User onboarding flow redesign" oninput="autoSave()">
      </div>
      <div class="quick-hidden-detail">
        <div class="field">
          <label for="featureDesc">Description</label>
          <textarea id="featureDesc" placeholder="Brief scope description..." oninput="autoSave()"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="requestorContext">Requestor context</label>
            <select id="requestorContext" onchange="autoSave()">
              <option value="">Select...</option>
              <option value="Executive priority">Executive priority</option>
              <option value="Manager ask">Manager ask</option>
              <option value="Team initiative">Team initiative</option>
              <option value="Backlog grooming">Backlog grooming</option>
              <option value="Exploratory/spike">Exploratory / spike</option>
            </select>
          </div>
          <div class="field">
            <label for="desiredTimeframe">Desired timeframe</label>
            <select id="desiredTimeframe" onchange="autoSave()">
              <option value="">Select...</option>
              <option value="1 week">1 week</option>
              <option value="2 weeks">2 weeks</option>
              <option value="1 month">1 month</option>
              <option value="1 quarter">1 quarter</option>
              <option value="No pressure / open-ended">No pressure / open-ended</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="section" id="sectionDimensions">
      <div class="section-title">Estimation dimensions</div>
      <div id="dimensionsList"></div>
    </div>

    <div class="totals-bar" id="totalsBar">
      <div class="total-item">
        <div class="total-label">Raw total</div>
        <div class="total-value" id="rawTotal">0</div>
      </div>
      <div class="total-item">
        <div class="total-label">Weighted total</div>
        <div class="total-value" id="weightedTotal">0</div>
      </div>
      <div class="total-item">
        <div class="total-label">Risk level</div>
        <div id="riskBadge"></div>
      </div>
    </div>

    <div class="section quick-hidden-detail" id="sectionApproaches">
      <div class="section-title">Delivery approaches</div>
      <div id="approachesList"></div>
      <button class="btn-add-approach" id="btnAddApproach" onclick="addApproach()">+ Add approach</button>
    </div>

    <div class="section section-summary">
      <div class="section-title">Summary</div>
      <div class="summary-panel">
        <div class="summary-header">
          <span class="summary-header-title">Output</span>
          <button class="btn-copy" id="btnCopy" onclick="copySummary()">Copy Markdown</button>
        </div>
        <div class="summary-body" id="summaryBody">Score the dimensions above to generate a summary.</div>
      </div>
    </div>
  </div>
</main>

<script>
const DIMENSIONS = [
  {
    key: 'complexity', name: 'Complexity',
    desc: 'How architecturally complex is the work?', weight: 1,
    tips: [
      { label: '1-2', text: 'Single component/file change' },
      { label: '3-5', text: 'Multiple systems, some integration' },
      { label: '8-13', text: 'Cross-cutting, multi-service, new infra' }
    ]
  },
  {
    key: 'unknowns', name: 'Unknowns',
    desc: 'How many "dark forests" exist in the codebase?', weight: 2,
    tips: [
      { label: '1-2', text: 'Well-trodden path, done similar before' },
      { label: '3-5', text: 'Some unfamiliar areas, needs research' },
      { label: '8-13', text: 'Uncharted territory, no prior art' }
    ]
  },
  {
    key: 'dependencies', name: 'Dependencies',
    desc: 'External blockers, other teams, APIs, approvals', weight: 1,
    tips: [
      { label: '1-2', text: 'Self-contained, no blockers' },
      { label: '3-5', text: '1-2 external dependencies' },
      { label: '8-13', text: 'Multiple teams, third-party APIs, approvals chain' }
    ]
  },
  {
    key: 'risk', name: 'Risk',
    desc: 'What happens if it goes wrong?', weight: 1,
    tips: [
      { label: '1-2', text: 'Low blast radius, easy rollback' },
      { label: '3-5', text: 'Moderate impact, needs careful rollout' },
      { label: '8-13', text: 'User-facing, data integrity, hard to reverse' }
    ]
  },
  {
    key: 'effort', name: 'Effort',
    desc: 'Raw volume of known work (code, tests, docs, review)', weight: 1,
    tips: [
      { label: '1-2', text: 'Small PR, < 1 day of heads-down work' },
      { label: '3-5', text: 'Multi-day, several PRs' },
      { label: '8-13', text: 'Multi-week, major feature branch' }
    ]
  }
];

const POINTS = [1, 2, 3, 5, 8, 13];

let state = {
  id: null, name: '', description: '', requestorContext: '',
  desiredTimeframe: '', scores: {}, approaches: [], quickMode: false
};

function esc(str) {
  const el = document.createElement('span');
  el.textContent = str || '';
  return el.innerHTML;
}

function getPointClass(val) {
  if (val <= 2) return 'low';
  if (val <= 5) return 'mid';
  if (val <= 8) return 'high';
  return 'vhigh';
}

function buildDimensionEl(dim) {
  const val = state.scores[dim.key] || 0;
  const hasVal = val > 0;
  const div = document.createElement('div');
  div.className = 'dimension' + (hasVal ? ' has-value' : '');

  const header = document.createElement('div');
  header.className = 'dimension-header';

  const info = document.createElement('div');
  info.className = 'dimension-info';

  const nameRow = document.createElement('div');
  nameRow.className = 'dimension-name';
  nameRow.textContent = dim.name;

  if (dim.weight > 1) {
    const badge = document.createElement('span');
    badge.className = 'weight-badge';
    badge.style.fontFamily = 'var(--font-mono)';
    badge.textContent = dim.weight + 'x weight';
    nameRow.appendChild(badge);
  }

  const tooltip = document.createElement('div');
  tooltip.className = 'dimension-tooltip';
  const tipIcon = document.createElement('span');
  tipIcon.className = 'tip-icon';
  tipIcon.tabIndex = 0;
  tipIcon.textContent = '?';
  tooltip.appendChild(tipIcon);

  const tipContent = document.createElement('div');
  tipContent.className = 'tip-content';
  dim.tips.forEach(function(t) {
    const row = document.createElement('div');
    row.className = 'tip-row';
    const label = document.createElement('span');
    label.className = 'tip-label';
    label.textContent = t.label;
    const text = document.createElement('span');
    text.className = 'tip-text';
    text.textContent = t.text;
    row.appendChild(label);
    row.appendChild(text);
    tipContent.appendChild(row);
  });
  tooltip.appendChild(tipContent);
  nameRow.appendChild(tooltip);

  const desc = document.createElement('div');
  desc.className = 'dimension-desc';
  desc.textContent = dim.desc;

  info.appendChild(nameRow);
  info.appendChild(desc);

  const valueEl = document.createElement('div');
  valueEl.className = 'dimension-value';
  valueEl.textContent = hasVal ? val : '';

  header.appendChild(info);
  header.appendChild(valueEl);

  const pointsRow = document.createElement('div');
  pointsRow.className = 'points-row';
  POINTS.forEach(function(p) {
    const btn = document.createElement('button');
    const cls = p === val ? 'selected ' + getPointClass(p) : getPointClass(p);
    btn.className = 'point-badge ' + cls;
    btn.tabIndex = 0;
    btn.textContent = p;
    btn.addEventListener('click', function() { selectPoint(dim.key, p); });
    btn.addEventListener('keydown', function(e) { if (e.key === 'Enter') selectPoint(dim.key, p); });
    pointsRow.appendChild(btn);
  });

  div.appendChild(header);
  div.appendChild(pointsRow);
  return div;
}

function renderDimensions() {
  var container = document.getElementById('dimensionsList');
  container.textContent = '';
  DIMENSIONS.forEach(function(dim) {
    container.appendChild(buildDimensionEl(dim));
  });
}

function selectPoint(dimKey, val) {
  if (state.scores[dimKey] === val) delete state.scores[dimKey];
  else state.scores[dimKey] = val;
  renderDimensions();
  updateTotals();
  renderApproaches();
  updateSummary();
  autoSave();
}

function calcRaw() {
  return DIMENSIONS.reduce(function(s, d) { return s + (state.scores[d.key] || 0); }, 0);
}

function calcWeighted() {
  return DIMENSIONS.reduce(function(s, d) { return s + (state.scores[d.key] || 0) * d.weight; }, 0);
}

function getRisk(weighted) {
  if (weighted === 0) return { level: 'low', label: 'Not scored', emoji: '' };
  if (weighted <= 15) return { level: 'low', label: 'Low risk \u2014 Straightforward, high confidence', emoji: '\uD83D\uDFE2' };
  if (weighted <= 30) return { level: 'medium', label: 'Medium risk \u2014 Some unknowns, plan for contingency', emoji: '\uD83D\uDFE1' };
  if (weighted <= 45) return { level: 'high', label: 'High risk \u2014 Significant unknowns, multiple approaches needed', emoji: '\uD83D\uDFE0' };
  return { level: 'critical', label: 'Very high risk \u2014 Dark forest territory, scope negotiation required', emoji: '\uD83D\uDD34' };
}

function updateTotals() {
  var raw = calcRaw();
  var weighted = calcWeighted();
  var risk = getRisk(weighted);
  document.getElementById('rawTotal').textContent = raw;
  document.getElementById('weightedTotal').textContent = weighted;

  var badgeContainer = document.getElementById('riskBadge');
  badgeContainer.textContent = '';
  var badge = document.createElement('span');
  badge.className = 'risk-badge ' + risk.level;
  badge.textContent = '\u25CF ' + risk.label;
  badgeContainer.appendChild(badge);
}

function addApproach() {
  if (state.approaches.length >= 3) return;
  state.approaches.push({ name: '', description: '', adjustments: {}, tradeoffs: '' });
  renderApproaches();
  autoSave();
}

function removeApproach(idx) {
  state.approaches.splice(idx, 1);
  renderApproaches();
  updateSummary();
  autoSave();
}

function buildApproachEl(approach, idx) {
  var adjTotal = calcApproachWeighted(approach);
  var baseWeighted = calcWeighted();
  var delta = adjTotal - baseWeighted;

  var div = document.createElement('div');
  div.className = 'approach-card fade-in';

  var header = document.createElement('div');
  header.className = 'approach-header';
  var num = document.createElement('span');
  num.className = 'approach-number';
  num.textContent = 'Approach ' + (idx + 1);
  var removeBtn = document.createElement('button');
  removeBtn.className = 'approach-remove';
  removeBtn.textContent = '\u00D7 Remove';
  removeBtn.addEventListener('click', function() { removeApproach(idx); });
  header.appendChild(num);
  header.appendChild(removeBtn);
  div.appendChild(header);

  var nameField = document.createElement('div');
  nameField.className = 'field';
  var nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.placeholder = 'e.g. MVP / bypass Y and Z';
  nameInput.value = approach.name || '';
  nameInput.addEventListener('input', function() {
    state.approaches[idx].name = this.value;
    updateSummary(); autoSave();
  });
  nameField.appendChild(nameInput);
  div.appendChild(nameField);

  var descField = document.createElement('div');
  descField.className = 'field';
  var descInput = document.createElement('textarea');
  descInput.placeholder = 'Approach description...';
  descInput.value = approach.description || '';
  descInput.addEventListener('input', function() {
    state.approaches[idx].description = this.value;
    updateSummary(); autoSave();
  });
  descField.appendChild(descInput);
  div.appendChild(descField);

  var adjustments = document.createElement('div');
  adjustments.className = 'approach-adjustments';
  var adjTitle = document.createElement('div');
  adjTitle.className = 'approach-adjustments-title';
  adjTitle.textContent = 'Adjusted scores per dimension';
  adjustments.appendChild(adjTitle);

  DIMENSIONS.forEach(function(dim) {
    var orig = state.scores[dim.key] || 0;
    var adj = approach.adjustments[dim.key];
    var adjVal = adj !== undefined ? adj : orig;

    var row = document.createElement('div');
    row.className = 'adjustment-row';

    var dimName = document.createElement('span');
    dimName.className = 'adjustment-dim-name';
    dimName.textContent = dim.name;
    row.appendChild(dimName);

    var origEl = document.createElement('span');
    origEl.className = 'adjustment-original';
    origEl.textContent = orig || '-';
    row.appendChild(origEl);

    var arrow = document.createElement('span');
    arrow.className = 'adjustment-arrow';
    arrow.textContent = '\u2192';
    row.appendChild(arrow);

    var adjRow = document.createElement('div');
    adjRow.className = 'adj-points-row';
    POINTS.filter(function(p) { return p <= orig || orig === 0; }).forEach(function(p) {
      var isSame = p === orig;
      var isSelected = p === adjVal;
      var btn = document.createElement('button');
      btn.className = 'adj-point-badge';
      if (isSelected && isSame) btn.className += ' same';
      else if (isSelected) btn.className += ' selected';
      btn.textContent = p;
      btn.addEventListener('click', function() { setAdjustment(idx, dim.key, p); });
      adjRow.appendChild(btn);
    });
    row.appendChild(adjRow);
    adjustments.appendChild(row);
  });
  div.appendChild(adjustments);

  var tradeField = document.createElement('div');
  tradeField.className = 'field';
  tradeField.style.marginTop = '12px';
  var tradeLabel = document.createElement('label');
  tradeLabel.textContent = 'Tradeoffs';
  var tradeInput = document.createElement('textarea');
  tradeInput.placeholder = 'What you give up with this approach...';
  tradeInput.value = approach.tradeoffs || '';
  tradeInput.addEventListener('input', function() {
    state.approaches[idx].tradeoffs = this.value;
    updateSummary(); autoSave();
  });
  tradeField.appendChild(tradeLabel);
  tradeField.appendChild(tradeInput);
  div.appendChild(tradeField);

  var totalRow = document.createElement('div');
  totalRow.className = 'approach-total';
  var totalLabel = document.createElement('span');
  totalLabel.className = 'approach-total-label';
  totalLabel.textContent = 'Adjusted weighted total';
  var totalRight = document.createElement('span');
  var totalVal = document.createElement('span');
  totalVal.className = 'approach-total-value';
  totalVal.textContent = adjTotal;
  totalRight.appendChild(totalVal);
  if (delta !== 0) {
    var deltaEl = document.createElement('span');
    deltaEl.className = 'approach-total-delta ' + (delta < 0 ? 'reduced' : 'same');
    deltaEl.textContent = delta < 0 ? String(delta) : '+' + delta;
    totalRight.appendChild(deltaEl);
  }
  totalRow.appendChild(totalLabel);
  totalRow.appendChild(totalRight);
  div.appendChild(totalRow);

  return div;
}

function renderApproaches() {
  var container = document.getElementById('approachesList');
  container.textContent = '';
  state.approaches.forEach(function(approach, idx) {
    container.appendChild(buildApproachEl(approach, idx));
  });
  var btn = document.getElementById('btnAddApproach');
  if (btn) btn.disabled = state.approaches.length >= 3;
}

function setAdjustment(approachIdx, dimKey, val) {
  var orig = state.scores[dimKey] || 0;
  var current = state.approaches[approachIdx].adjustments[dimKey];
  if (val === orig && current === undefined) return;
  if (val === current) delete state.approaches[approachIdx].adjustments[dimKey];
  else state.approaches[approachIdx].adjustments[dimKey] = val;
  renderApproaches();
  updateSummary();
  autoSave();
}

function calcApproachWeighted(approach) {
  return DIMENSIONS.reduce(function(sum, d) {
    var base = state.scores[d.key] || 0;
    var adj = approach.adjustments[d.key];
    var val = adj !== undefined ? adj : base;
    return sum + val * d.weight;
  }, 0);
}

function updateSummary() {
  var el = document.getElementById('summaryBody');
  var scored = Object.keys(state.scores).length;
  if (scored === 0) {
    el.textContent = 'Score the dimensions above to generate a summary.';
    return;
  }

  var name = state.name || 'Untitled feature';
  var raw = calcRaw();
  var weighted = calcWeighted();
  var risk = getRisk(weighted);

  var md = '## ' + name + '\n';
  if (!state.quickMode) {
    if (state.description) md += '\n' + state.description + '\n';
    md += '\n';
    if (state.requestorContext) md += '**Context:** ' + state.requestorContext + '\n';
    if (state.desiredTimeframe) md += '**Desired timeframe:** ' + state.desiredTimeframe + '\n';
    if (state.requestorContext || state.desiredTimeframe) md += '\n';
  }

  md += '### Scores\n\n';
  md += '| Dimension | Score | Weight |\n';
  md += '|-----------|-------|--------|\n';
  DIMENSIONS.forEach(function(d) {
    var s = state.scores[d.key] || '-';
    md += '| ' + d.name + ' | ' + s + ' | ' + d.weight + 'x |\n';
  });
  md += '\n';
  md += '**Raw total:** ' + raw + '  \n';
  md += '**Weighted total:** ' + weighted + '  \n';
  md += '**Risk:** ' + risk.emoji + ' ' + risk.label + '\n';

  if (!state.quickMode && state.approaches.length > 0) {
    md += '\n### Approaches\n';
    var bestApproach = null;
    var bestScore = Infinity;

    state.approaches.forEach(function(a, i) {
      var adjW = calcApproachWeighted(a);
      var d = adjW - weighted;
      var aName = a.name || 'Approach ' + (i + 1);
      md += '\n**' + (i + 1) + '. ' + aName + '** (weighted: ' + adjW + (d < 0 ? ', ' + d : '') + ')\n';
      if (a.description) md += a.description + '\n';

      var changes = [];
      DIMENSIONS.forEach(function(dim) {
        if (a.adjustments[dim.key] !== undefined && a.adjustments[dim.key] !== state.scores[dim.key]) {
          changes.push(dim.name + ': ' + (state.scores[dim.key] || 0) + ' \u2192 ' + a.adjustments[dim.key]);
        }
      });
      if (changes.length) md += 'Adjustments: ' + changes.join(', ') + '\n';
      if (a.tradeoffs) md += 'Tradeoffs: ' + a.tradeoffs + '\n';

      if (adjW < bestScore) { bestScore = adjW; bestApproach = aName; }
    });

    if (bestApproach && state.approaches.length > 1) {
      md += '\n**Recommendation:** ' + bestApproach + ' offers the best risk/tradeoff ratio.\n';
    }
  }

  el.textContent = md;
}

function copySummary() {
  var text = document.getElementById('summaryBody').textContent;
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('btnCopy');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = 'Copy Markdown';
      btn.classList.remove('copied');
    }, 1500);
  });
}

function toggleMode() {
  state.quickMode = !state.quickMode;
  applyMode();
  autoSave();
}

function applyMode() {
  var toggle = document.getElementById('modeToggle');
  toggle.classList.toggle('active', state.quickMode);
  toggle.setAttribute('aria-checked', String(state.quickMode));
  document.querySelectorAll('.quick-hidden-detail').forEach(function(el) {
    el.classList.toggle('quick-hidden', state.quickMode);
  });
  updateSummary();
}

var STORAGE_KEY = 'est_history';

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
}

function saveHistory(history) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function autoSave() {
  state.name = document.getElementById('featureName').value;
  state.description = document.getElementById('featureDesc').value;
  state.requestorContext = document.getElementById('requestorContext').value;
  state.desiredTimeframe = document.getElementById('desiredTimeframe').value;

  if (!state.name && Object.keys(state.scores).length === 0) return;

  var history = loadHistory();
  if (!state.id) {
    state.id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  }

  var entry = {
    id: state.id, name: state.name || 'Untitled',
    description: state.description, requestorContext: state.requestorContext,
    desiredTimeframe: state.desiredTimeframe,
    scores: Object.assign({}, state.scores),
    approaches: JSON.parse(JSON.stringify(state.approaches)),
    quickMode: state.quickMode, timestamp: Date.now(),
    weighted: calcWeighted()
  };

  var idx = history.findIndex(function(h) { return h.id === state.id; });
  if (idx >= 0) history[idx] = entry;
  else history.unshift(entry);

  saveHistory(history);
  renderHistory();
  updateSummary();
}

function renderHistory() {
  var container = document.getElementById('historyList');
  var history = loadHistory();

  container.textContent = '';

  if (history.length === 0) {
    var empty = document.createElement('div');
    empty.className = 'history-empty';
    empty.textContent = 'No saved estimations';
    container.appendChild(empty);
    return;
  }

  history.forEach(function(h) {
    var date = new Date(h.timestamp);
    var dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    var risk = getRisk(h.weighted || 0);
    var active = h.id === state.id;

    var item = document.createElement('div');
    item.className = 'history-item' + (active ? ' active' : '');
    item.addEventListener('click', function() { loadEstimation(h.id); });

    var nameEl = document.createElement('div');
    nameEl.className = 'history-item-name';
    nameEl.textContent = h.name;
    item.appendChild(nameEl);

    var meta = document.createElement('div');
    meta.className = 'history-item-meta';
    var dateEl = document.createElement('span');
    dateEl.textContent = dateStr;
    meta.appendChild(dateEl);

    var riskEl = document.createElement('span');
    riskEl.className = 'risk-badge ' + risk.level;
    riskEl.style.padding = '1px 6px';
    riskEl.style.fontSize = '0.6rem';
    riskEl.textContent = '\u25CF ' + (h.weighted || 0);
    meta.appendChild(riskEl);
    item.appendChild(meta);

    var delBtn = document.createElement('button');
    delBtn.className = 'history-item-delete';
    delBtn.title = 'Delete';
    delBtn.textContent = '\u00D7';
    delBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      deleteEstimation(h.id);
    });
    item.appendChild(delBtn);

    container.appendChild(item);
  });
}

function loadEstimation(id) {
  var history = loadHistory();
  var entry = history.find(function(h) { return h.id === id; });
  if (!entry) return;

  state.id = entry.id;
  state.name = entry.name || '';
  state.description = entry.description || '';
  state.requestorContext = entry.requestorContext || '';
  state.desiredTimeframe = entry.desiredTimeframe || '';
  state.scores = Object.assign({}, entry.scores);
  state.approaches = JSON.parse(JSON.stringify(entry.approaches || []));
  state.quickMode = entry.quickMode || false;

  document.getElementById('featureName').value = state.name;
  document.getElementById('featureDesc').value = state.description;
  document.getElementById('requestorContext').value = state.requestorContext;
  document.getElementById('desiredTimeframe').value = state.desiredTimeframe;

  renderDimensions();
  updateTotals();
  renderApproaches();
  applyMode();
  updateSummary();
  renderHistory();
  closeSidebar();
}

function deleteEstimation(id) {
  var history = loadHistory().filter(function(h) { return h.id !== id; });
  saveHistory(history);
  if (state.id === id) newEstimation();
  renderHistory();
}

function clearHistory() {
  if (!confirm('Clear all saved estimations?')) return;
  localStorage.removeItem(STORAGE_KEY);
  newEstimation();
  renderHistory();
}

function newEstimation() {
  var wasQuick = state.quickMode;
  state = {
    id: null, name: '', description: '', requestorContext: '',
    desiredTimeframe: '', scores: {}, approaches: [], quickMode: wasQuick
  };
  document.getElementById('featureName').value = '';
  document.getElementById('featureDesc').value = '';
  document.getElementById('requestorContext').value = '';
  document.getElementById('desiredTimeframe').value = '';
  renderDimensions();
  updateTotals();
  renderApproaches();
  updateSummary();
  renderHistory();
  document.getElementById('featureName').focus();
  closeSidebar();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}

document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

renderDimensions();
updateTotals();
renderHistory();
applyMode();
</script>
</body>
</html>
